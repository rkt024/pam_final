version: '3.8'

services:
  pam_final:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pam_final
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      # Application settings
      - VERIFY_SSL=false
      - DATA_DIR=/app/data
      - TRACKING_DB_PATH=/app/data/tracking.db
      # Streamlit settings
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      # Optional: override base URL for different environments
      # - BASE_URL=https://public.dolma.gov.np
    volumes:
      # Persistent data storage - survives container rebuilds
      - pam_final_data:/app/data
      # Optional: mount .env for local development
      # - .env:/app/.env:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - pam_final_network

volumes:
  pam_final_data:
    driver: local
    # For production, consider using a named volume or bind mount:
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: /opt/pam_final/data

networks:
  pam_final_network:
    driver: bridge